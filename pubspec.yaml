name: futsmandu
description: Book football courts in Kathmandu
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  futsmandu_design_system:
    path: ../futsmandu_design_system
  dio: ^5.7.0
  flutter_secure_storage: ^10.0.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  pinput: ^6.0.2
  http: ^1.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  table_calendar: ^3.2.0
  time: ^2.1.6
  esewa_flutter: ^3.0.1
  google_maps_flutter: ^2.10.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/raw/maptheme.json

flutter_launcher_icons:
  android: true
  ios: true
  # Use the app icon source (optimized to remove internal padding).
  image_path: "assets/logo.png"
  # Avoid iOS warnings and ensure fully opaque launcher icons.
  remove_alpha_ios: true
